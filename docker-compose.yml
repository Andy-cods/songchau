version: "3.9"

networks:
  internal:
  public:

volumes:
  pg_data:
  redis_data:

services:

  postgres:
    image: postgres:16-alpine
    container_name: sc-postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks: [internal]
    command: >
      postgres
      -c shared_buffers=1536MB
      -c effective_cache_size=4GB
      -c work_mem=16MB
      -c maintenance_work_mem=256MB
      -c max_connections=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c wal_buffers=16MB
      -c min_wal_size=80MB
      -c max_wal_size=2GB
      -c checkpoint_completion_target=0.9
      -c default_statistics_target=100
      -c log_min_duration_statement=500
      -c log_checkpoints=on
      -c huge_pages=off
      -c shared_preload_libraries='pg_stat_statements'
    shm_size: 256m
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sc-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks: [internal]
    deploy:
      resources:
        limits:
          memory: 320M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sc-api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./data/files:/data/files
      - /data/onedrive-staging:/data/onedrive-staging
      - /var/run/docker.sock:/var/run/docker.sock
    networks: [internal]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sc-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: /api
      NODE_ENV: production
    networks: [internal]
    depends_on:
      - api
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  nginx:
    image: nginx:1.26-alpine
    container_name: sc-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./data/files:/data/files:ro
      - /var/www/certbot:/var/www/certbot:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks: [internal, public]
    depends_on:
      - api
      - frontend
      - vendor-portal
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 32M

  vendor-portal:
    build:
      context: ./vendor-portal
      dockerfile: Dockerfile
    container_name: sc-vendor-portal
    restart: unless-stopped
    networks: [internal]
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  procrastinate-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sc-worker
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./data/files:/data/files
      - /data/onedrive-staging:/data/onedrive-staging:ro
    command: python -m procrastinate --app=app.core.procrastinate_app.app worker --concurrency=5
    networks: [internal]
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 384M

  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: sc-libreoffice
    restart: unless-stopped
    networks: [internal]
    command:
      - "gotenberg"
      - "--api-timeout=120s"
      - "--libreoffice-restart-after=50"
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  onlyoffice:
    image: onlyoffice/documentserver:latest
    container_name: sc-onlyoffice
    restart: unless-stopped
    networks: [internal]
    environment:
      - JWT_ENABLED=false
    volumes:
      - ./data/files:/data/files
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  procrastinate-scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sc-scheduler
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    volumes:
      - ./data/files:/data/files
      - /data/onedrive-staging:/data/onedrive-staging:ro
    command: python -m procrastinate --app=app.core.procrastinate_app.app worker --concurrency=1 --listen-notify
    networks: [internal]
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 384M
