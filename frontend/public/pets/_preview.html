<!doctype html>
<html><head><meta charset="utf-8"><title>Pet Pixel Art Preview</title>
<style>
  body{background:#1a1625;color:#fff;font-family:system-ui;padding:24px;margin:0}
  h1{font-size:18px;margin:0 0 16px}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;max-width:760px}
  .row{display:flex;gap:8px;align-items:center;justify-content:center}
  .card{background:#231b32;border-radius:12px;padding:8px;text-align:center}
  .card img{width:140px;height:140px;background:#2d2440;border-radius:50%;display:block;margin:auto}
  .card .name{margin-top:6px;font-size:12px;opacity:0.7}
  .species{margin:24px 0 8px;font-size:14px;color:#fcd34d;font-weight:600}
</style></head><body>
<h1>SONG CHAU ERP — Pixel-art pet sprites (9 species × 3 forms)</h1>
<div id="root"></div>
<script>
  const species=['dog','cat','koi','seagull','duck','horse','flower','plant','dragon'];
  const labels={dog:'Chó',cat:'Mèo',koi:'Cá Koi',seagull:'Hải âu',duck:'Vịt',horse:'Ngựa',flower:'Hoa',plant:'Cây',dragon:'Rồng'};
  const root=document.getElementById('root');
  species.forEach(s=>{
    const t=document.createElement('div');t.className='species';t.textContent=labels[s].toUpperCase();
    root.appendChild(t);
    const g=document.createElement('div');g.className='grid';
    for(let f=1;f<=3;f++){
      const c=document.createElement('div');c.className='card';
      c.innerHTML='<img src="'+s+'_'+f+'.svg" alt="'+s+f+'"><div class="name">Form '+f+'</div>';
      g.appendChild(c);
    }
    root.appendChild(g);
  });
</script>
</body></html>
