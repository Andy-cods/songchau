# ═══════════════════════════════════════════════════════════════════
# Song Châu ERP — Nginx SSL Configuration
# Domain: erp.songchau.vn
# VPS:    103.56.158.129
#
# Yêu cầu:
#   - SSL cert tại: /etc/letsencrypt/live/erp.songchau.vn/
#   - Chạy ssl_setup.sh để lấy cert từ Let's Encrypt
#   - Mount volumes vào nginx container:
#       - /etc/letsencrypt:/etc/letsencrypt:ro
#
# Kích hoạt: thay default.conf bằng file này
# ═══════════════════════════════════════════════════════════════════

# Rate limiting zones (giống default.conf)
limit_req_zone $binary_remote_addr zone=api_general:10m rate=100r/m;
limit_req_zone $binary_remote_addr zone=api_auth:10m    rate=5r/m;
limit_req_zone $binary_remote_addr zone=api_upload:10m  rate=10r/m;

upstream api_backend {
    server api:8000;
    keepalive 32;
}

upstream frontend_app {
    server frontend:3000;
    keepalive 16;
}

# ── Server block: HTTP -> HTTPS redirect ─────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name erp.songchau.vn www.erp.songchau.vn;

    # ACME challenge cho Let's Encrypt renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    # Redirect tất cả HTTP sang HTTPS (301 permanent)
    location / {
        return 301 https://erp.songchau.vn$request_uri;
    }
}

# ── Server block: HTTPS chính ─────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name erp.songchau.vn;

    # ── SSL Certificates (Let's Encrypt) ─────────────────────────
    ssl_certificate     /etc/letsencrypt/live/erp.songchau.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/erp.songchau.vn/privkey.pem;

    # ── SSL Protocol và Cipher (Mozilla Intermediate 2024) ────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # ── SSL Session Cache ─────────────────────────────────────────
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ── OCSP Stapling ─────────────────────────────────────────────
    ssl_stapling        on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/erp.songchau.vn/chain.pem;
    resolver 8.8.8.8 8.8.4.4 1.1.1.1 valid=300s;
    resolver_timeout 5s;

    # ── Security Headers ──────────────────────────────────────────
    # HSTS: Bảo buộc HTTPS trong 1 năm (bật sau khi HTTPS đã ổn định)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # Content Security Policy — điều chỉnh theo nhu cầu
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' wss://erp.songchau.vn; frame-ancestors 'none';" always;

    # ── General Settings ──────────────────────────────────────────
    client_max_body_size 50M;

    # Gzip compression
    gzip on;
    gzip_types text/plain application/json application/javascript text/css image/svg+xml application/wasm;
    gzip_min_length 1000;
    gzip_vary on;
    gzip_comp_level 6;

    # ── Health check (không rate limit) ──────────────────────────
    location = /api/health {
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;

        # Không cache health check
        add_header Cache-Control "no-store, no-cache";
        access_log off;
    }

    # ── Auth endpoints — giới hạn chặt ───────────────────────────
    location /api/v1/auth/ {
        limit_req zone=api_auth burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 30s;
    }

    # ── File upload ────────────────────────────────────────────────
    location /api/v1/files/upload {
        limit_req zone=api_upload burst=5 nodelay;

        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        client_max_body_size 50M;
    }

    # ── API chung ─────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_general burst=20 nodelay;

        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 60s;

        # Keep-alive connections
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ── WebSocket / Socket.IO ─────────────────────────────────────
    location /ws/ {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        # Tắt buffering cho WebSocket
        proxy_buffering off;
    }

    # ── Static file downloads ─────────────────────────────────────
    location /files/ {
        alias /data/files/;
        add_header Content-Disposition "attachment";

        # Cache 1 giờ
        expires 1h;
        add_header Cache-Control "private, max-age=3600";

        # Bảo mật: không cho listing thư mục
        autoindex off;
    }

    # ── Next.js Frontend ──────────────────────────────────────────
    location / {
        proxy_pass http://frontend_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # Keep-alive
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ── Next.js static assets (cache lâu dài) ────────────────────
    location /_next/static/ {
        proxy_pass http://frontend_app;
        expires 365d;
        add_header Cache-Control "public, immutable, max-age=31536000";

        # Không cần security headers cho static files
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ── Next.js image optimization ────────────────────────────────
    location /_next/image {
        proxy_pass http://frontend_app;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        expires 7d;
    }

    # ── Favicon và robots.txt ─────────────────────────────────────
    location = /favicon.ico {
        proxy_pass http://frontend_app;
        expires 30d;
        log_not_found off;
        access_log off;
    }

    location = /robots.txt {
        proxy_pass http://frontend_app;
        log_not_found off;
        access_log off;
    }

    # ── Chặn các path nguy hiểm ───────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ \.(env|git|sql|bak|log)$ {
        deny all;
        return 404;
    }
}

# ── Redirect www sang non-www ─────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.erp.songchau.vn;

    ssl_certificate     /etc/letsencrypt/live/erp.songchau.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/erp.songchau.vn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    return 301 https://erp.songchau.vn$request_uri;
}
