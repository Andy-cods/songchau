# Cổng NCC (vendor portal) — vendor.songchau.vn @ 45.124.95.32
# LIVE HTTPS: port 80 = ACME challenge + redirect 301 → https; port 443 = TLS.
# Cert Let's Encrypt (certbot webroot /var/www/certbot), auto-renew qua cron host.

# ─── Port 80: ACME challenge (auto-renew) + ép về HTTPS ─────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name vendor.songchau.vn;

    # GIỮ location này cả sau khi bật HTTPS để certbot auto-renew hoạt động.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── Port 443: TLS + reverse proxy ─────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name vendor.songchau.vn;

    ssl_certificate     /etc/letsencrypt/live/vendor.songchau.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vendor.songchau.vn/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    client_max_body_size 25m;   # NCC upload ảnh/file báo giá

    # API → vendor-api (backend SC_ROLE=vendor, chỉ /api/vendor + /api/health)
    location /api/ {
        proxy_pass http://vendor-api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120s;
    }

    # Còn lại → vendor-portal (Next.js cổng NCC, phục vụ tại root '/')
    location / {
        proxy_pass http://vendor-portal:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
