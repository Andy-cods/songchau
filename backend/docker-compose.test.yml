# ---------------------------------------------------------------------------
# docker-compose.test.yml — EPHEMERAL Postgres + Redis for the CI test harness.
#
# W1-01 (Đợt 1). Spins up a THROWAWAY database + cache so the pytest suite can
# run WITHOUT any live prod server. Design goals:
#   * tmpfs data dir  -> fast, wiped on `down` (no volume, no disk residue)
#   * non-prod ports  -> 55432 / 56379 so it NEVER collides with a local/prod
#                        Postgres (5432) or Redis (6379)
#   * healthchecks    -> `docker compose up -d --wait` blocks until ready
#   * matches prod    -> postgres:16-alpine + redis:7-alpine (see
#                        docker-compose.yml) so a pg_dump --schema-only snapshot
#                        taken from prod replays cleanly here.
#
# Usage: driven by scripts/run_tests.sh — you normally never call this directly.
#   docker compose -f docker-compose.test.yml up -d --wait
#   docker compose -f docker-compose.test.yml down -v
# ---------------------------------------------------------------------------

name: songchau-erp-test

services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sc_test
      POSTGRES_USER: sc_test
      POSTGRES_PASSWORD: sc_test
      # Speed: fsync off is safe for a disposable tmpfs test DB.
      POSTGRES_INITDB_ARGS: "--nosync"
    command:
      - "postgres"
      - "-c"
      - "fsync=off"
      - "-c"
      - "synchronous_commit=off"
      - "-c"
      - "full_page_writes=off"
    ports:
      # host:container — host 55432 avoids the prod/local 5432.
      - "127.0.0.1:55432:5432"
    tmpfs:
      # RAM-backed data dir: no volume, nothing persists past `down`.
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sc_test -d sc_test"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 5s

  redis-test:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      # host 56379 avoids the prod/local 6379.
      - "127.0.0.1:56379:6379"
    tmpfs:
      - /data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 2s
