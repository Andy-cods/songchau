[pytest]
# W1-01 test harness. asyncio_mode=auto so `async def test_*` and async fixtures
# run without a per-test @pytest.mark.asyncio decorator.
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    smoke: harness self-proof (in-process ASGI + bootstrap schema)
    unit: pure-function tests, no DB / no network
    integration: in-process API tests needing the full prod schema snapshot (tests/_schema_snapshot.sql); auto-skipped otherwise
    e2e: live-backend end-to-end (set RUN_E2E=1 or `-m e2e`)

filterwarnings =
    # Redefining a session-scoped event_loop fixture is deprecated in
    # pytest-asyncio 0.23 but still the simplest way to share one loop across
    # session async fixtures. Silence just that noise.
    ignore::DeprecationWarning
